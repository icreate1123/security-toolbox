name: org-snyk-code

on:
  workflow_dispatch:
    inputs:
      repo_filter:
        description: Optional regex filter, for example ^(api|web)-
        required: false
        default: ""
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Create installation token for discovery
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SCANNER_APP_ID }}
          private-key: ${{ secrets.SCANNER_APP_PRIVATE_KEY }}
          owner: ${{ vars.SCAN_OWNER }}

      - name: Build repo matrix
        id: build
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_OWNER: ${{ vars.SCAN_OWNER }}
          REPO_FILTER: ${{ github.event.inputs.repo_filter || '' }}
        run: |
          set -euo pipefail

          all='[]'
          page=1

          while :; do
            resp="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/installation/repositories?per_page=100&page=${page}")"

            count="$(echo "$resp" | jq '.repositories | length')"
            [ "$count" -eq 0 ] && break

            batch="$(echo "$resp" | jq --arg owner "$GH_OWNER" --arg regex "$REPO_FILTER" '
              .repositories
              | map(select(.owner.login == $owner))
              | map(select(.archived == false and .disabled == false))
              | map(select($regex == "" or (.name | test($regex))))
              | map({
                  owner: .owner.login,
                  repo: .name,
                  full_name: .full_name,
                  default_branch: .default_branch
                })
            ')"

            all="$(jq -cn --argjson a "$all" --argjson b "$batch" '$a + $b')"
            page=$((page + 1))
          done

          echo "matrix=${all}" >> "$GITHUB_OUTPUT"

  scan:
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        repo: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout central repo
        uses: actions/checkout@v5

      - name: Create token for target repo
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SCANNER_APP_ID }}
          private-key: ${{ secrets.SCANNER_APP_PRIVATE_KEY }}
          owner: ${{ matrix.repo.owner }}
          repositories: ${{ matrix.repo.repo }}

      - name: Build scanner image
        run: docker build -t security-toolbox:ci .

      - name: Run scan in toolbox container
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          TARGET_OWNER: ${{ matrix.repo.owner }}
          TARGET_REPO: ${{ matrix.repo.repo }}
          TARGET_FULL_NAME: ${{ matrix.repo.full_name }}
          TARGET_BRANCH: ${{ matrix.repo.default_branch }}
        run: |
          docker run --rm \
            -e GH_TOKEN \
            -e SNYK_TOKEN \
            -e TARGET_OWNER \
            -e TARGET_REPO \
            -e TARGET_FULL_NAME \
            -e TARGET_BRANCH \
            -v "$PWD:/work" \
            security-toolbox:ci \
            bash /work/scripts/scan-and-upload.sh
